<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      // Apply saved theme before first paint to prevent flash.
      (function(){var t=localStorage.getItem('cbpro-theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.querySelector('meta[name="theme-color"]').content='#0d1117';}})();
    </script>
    <meta
      name="description"
      content="Coinbase Pro Real-Time Market Feed — BTC, ETH, XRP, LTC"
    />
    <title>Coinbase Pro Live Feed</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
